# Desactivar la base de datos H2
spring.h2.console.enabled=false

# Configuración del servidor
server.port=${PORT:8081}



# Configuración de Thymeleaf
spring.thymeleaf.cache=false

# Configuración de logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.pa.spring.prueba1=DEBUG

# Tamaño máximo de archivo
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Ruta para servir archivos estáticos
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# --- Zona horaria y serialización de fechas ---
# Interpreta y formatea fechas en la zona local (America/Bogota)
# Jackson: zona horaria para (de)serialización
spring.jackson.time-zone=America/Bogota
# Nota: la zona por defecto de la JVM ya se establece en PaPrueba1Application
# (TimeZone.setDefault). No es necesario añadir una propiedad adicional de MVC aquí
# ya que puede variar entre versiones de Spring Boot y dar warnings.
# Evita que Jackson escriba fechas como timestamps numéricos y use ISO-8601 legible
spring.jackson.serialization.write-dates-as-timestamps=false

